spring.datasource.url=jdbc:h2:mem:schedulertestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/optimizer-schema.sql
jobs.base-uri=http://localhost:9999
scheduler.ofd.max-files-per-bin=1000000
scheduler.results-endpoint=http://localhost:8080/v1/optimizer/operations
scheduler.cluster-id=test-cluster
