plugins {
  id 'openhouse.java-conventions'
}

configurations {
  compileOnly {
    extendsFrom annotationProcessor
  }
}

ext {
  springVersion = '2.7.8'
  springLog4jVersion = '2.3.4.RELEASE'
  // Iceberg 1.5.x pulls slf4j-api 2.x onto the classpath. SLF4J 2.x discovers bindings via
  // ServiceLoader and ignores the SLF4J 1.x-style bindings (log4j-slf4j-impl, slf4j-log4j12)
  // shipped with the log4j2 starter and Hadoop; without a 2.x-compatible binding SLF4J
  // silently falls back to NOP and application logs disappear from stdout.
  log4jSlf4j2Version = '2.20.0'
}

configurations {
  // Excluding these libraries avoids competing implementations for LoggerFactory
  // Standardizing on slf4j + log4j2 as implementation.
  all*.exclude module : 'spring-boot-starter-logging'
  all*.exclude module : 'logback-classic'
  // SLF4J 1.x-style bindings — incompatible with the slf4j-api 2.x resolved by Iceberg.
  all*.exclude module : 'log4j-slf4j-impl'
  all*.exclude module : 'slf4j-log4j12'
}

dependencies {
  api 'io.micrometer:micrometer-registry-prometheus:1.12.3'
  api 'org.springframework.boot:spring-boot-starter-web:' + springVersion

  implementation 'org.springframework.boot:spring-boot-starter-log4j2:' + springLog4jVersion
  // Replaces log4j-slf4j-impl (SLF4J 1.x binding) excluded above with the SLF4J 2.x variant.
  implementation 'org.apache.logging.log4j:log4j-slf4j2-impl:' + log4jSlf4j2Version
  api 'org.springframework.boot:spring-boot-starter-actuator:2.7.8'
  api 'org.springframework.boot:spring-boot-starter-validation:' + springVersion
  annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor:' + springVersion
  testImplementation 'org.springframework.boot:spring-boot-starter-test:' + springVersion

  api 'org.springframework.boot:spring-boot-starter-data-jpa:' + springVersion
  implementation 'com.h2database:h2:' + '2.1.210'

  implementation 'org.springdoc:springdoc-openapi-ui:1.7.0'
  implementation 'org.springdoc:springdoc-openapi-data-rest:1.7.0'
  api 'io.swagger.core.v3:swagger-annotations:2.1.11'

  api("javax.servlet:javax.servlet-api:4.0.1")
}