spring.datasource.url=jdbc:h2:mem:schedulertestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
jobs.base-uri=http://localhost:9999
scheduler.bin-size-max-files=1000000
scheduler.operation-type=ORPHAN_FILES_DELETION
scheduler.results-endpoint=http://localhost:8080/v1/table-operations
scheduler.cluster-id=test-cluster
