      pom.packaging = 'jar'
    }
  }
}

def classPathWithoutMultiReleasePrefix = { String path ->
  path.replaceFirst('^META-INF/versions/[0-9]+/', '')
}

def classUtf8Constants = { java.util.zip.ZipFile archive, java.util.zip.ZipEntry entry ->
  archive.getInputStream(entry).withCloseable { rawInput ->
    def input = new DataInputStream(new BufferedInputStream(rawInput))
    if (input.readUnsignedShort() != 0xCAFE || input.readUnsignedShort() != 0xBABE) {
      throw new RuntimeException("Invalid class file in vendored runtime: ${entry.name}")
    }
    input.skipBytes(4)
    int constantPoolCount = input.readUnsignedShort()
    def constants = []
    for (int index = 1; index < constantPoolCount; index++) {
      int tag = input.readUnsignedByte()
      switch (tag) {
        case 1:
          constants.add(input.readUTF())
          break
        case 3:
        case 4:
          input.skipBytes(4)
          break
        case 5:
        case 6:
          input.skipBytes(8)
          index++
          break
        case 7:
        case 8:
        case 16:
        case 19:
        case 20:
          input.skipBytes(2)
          break
        case 9:
        case 10:
        case 11:
        case 12:
        case 17:
        case 18:
          input.skipBytes(4)
          break
        case 15:
          input.skipBytes(3)
          break
        default:
          throw new RuntimeException(
              "Unsupported constant-pool tag ${tag} in vendored class ${entry.name}")
      }
    }
    constants
  }
}

tasks.register('verifyShadingPolicy') {
  dependsOn shadowJar

  doLast {
    def archive = new java.util.zip.ZipFile(shadowJar.archiveFile.get().asFile)
    try {
      def forbiddenClasses = archive.entries().findAll { entry ->
        if (entry.directory || !entry.name.endsWith('.class') || entry.name.endsWith('module-info.class')) {
          return false
        }
        def classPath = classPathWithoutMultiReleasePrefix(entry.name)
        !classPath.startsWith('com/linkedin/openhouse/') &&
            !classPath.startsWith('com/linkedin/openhouse/relocated/')
      }.collect { it.name }.sort()

      if (!forbiddenClasses.isEmpty()) {
        throw new RuntimeException(
            "Unrelocated dependency classes found in ${shadowJar.archiveFile.get().asFile.name}:\n" +
                forbiddenClasses.take(50).join('\n'))
      }

      def requiredRelocatedClasses = [
          'com/linkedin/openhouse/relocated/org/apache/iceberg/Table.class',
          'com/linkedin/openhouse/relocated/org/apache/iceberg/nessie/NessieCatalog.class',
          'com/linkedin/openhouse/relocated/org/apache/iceberg/parquet/Parquet.class',
          'com/linkedin/openhouse/relocated/org/apache/hadoop/conf/Configuration.class',
          'com/linkedin/openhouse/relocated/com/fasterxml/jackson/databind/ObjectMapper.class',
          'com/linkedin/openhouse/relocated/com/google/common/collect/ImmutableList.class',
          'com/linkedin/openhouse/relocated/org/slf4j/LoggerFactory.class',
          'com/linkedin/openhouse/relocated/org/slf4j/spi/SLF4JServiceProvider.class',
          'com/linkedin/openhouse/relocated/org/apache/log4j/Logger.class',
          'com/linkedin/openhouse/relocated/org/apache/commons/logging/LogFactory.class',
          'com/linkedin/openhouse/relocated/org/apache/logging/log4j/LogManager.class',
          'com/linkedin/openhouse/logging/SystemLoggerServiceProvider.class'
      ]
      def archiveEntries = archive.entries().collect { it.name }.toSet()
      def missingClasses = requiredRelocatedClasses.findAll { !archiveEntries.contains(it) }
      if (!missingClasses.isEmpty()) {
        throw new RuntimeException(
            "Required relocated classes are missing from ${shadowJar.archiveFile.get().asFile.name}:\n" +
                missingClasses.join('\n'))
      }

      def canonicalClasses = [
          'org/apache/iceberg/Table.class',
          'org/apache/hadoop/conf/Configuration.class',
          'com/fasterxml/jackson/databind/ObjectMapper.class',
          'com/google/common/collect/ImmutableList.class',
          'org/slf4j/LoggerFactory.class',
          'org/apache/log4j/Logger.class',
          'org/apache/commons/logging/LogFactory.class',
          'org/apache/logging/log4j/LogManager.class'
      ].findAll { archiveEntries.contains(it) }
      if (!canonicalClasses.isEmpty()) {
        throw new RuntimeException(
            "Canonical dependency classes leaked into ${shadowJar.archiveFile.get().asFile.name}:\n" +
                canonicalClasses.join('\n'))
      }

      def conflictingResources = [
          'assets/org/apache/commons/math3/exception/util/LocalizedFormats_fr.properties',
          'common-version-info.properties',
          'core-default.xml',
          'logicalType.avsc',
          'parquet.thrift',
          'stringBehavior.avsc',
          'META-INF/services/org.slf4j.spi.SLF4JServiceProvider'
      ].findAll { archiveEntries.contains(it) }
      conflictingResources.addAll(archiveEntries.findAll { entryName ->
        entryName ==~ /(?i)(^|.*\/)(log4j[^\/]*\.(properties|xml)|logback[^\/]*\.(groovy|xml)|simplelogger\.properties)/ ||
            entryName.contains('/logging/logback/')
      })
      if (!conflictingResources.isEmpty()) {
        throw new RuntimeException(
            "Unisolated resources leaked into ${shadowJar.archiveFile.get().asFile.name}:\n" +
                conflictingResources.join('\n'))
      }

      def prohibitedPrivateImplementations = archiveEntries.findAll { entryName ->
        entryName.startsWith('com/linkedin/openhouse/relocated/ch/qos/logback/') ||
            entryName.startsWith('com/linkedin/openhouse/relocated/org/apache/logging/log4j/core/') ||
            entryName == 'com/linkedin/openhouse/relocated/org/slf4j/impl/StaticLoggerBinder.class'
      }.sort()
      if (!prohibitedPrivateImplementations.isEmpty()) {
        throw new RuntimeException(
            "Competing private logging implementations leaked into " +
                "${shadowJar.archiveFile.get().asFile.name}:\n" +
                prohibitedPrivateImplementations.take(50).join('\n'))
      }

      def providerDescriptor =
          'META-INF/services/com.linkedin.openhouse.relocated.org.slf4j.spi.SLF4JServiceProvider'
      def providerEntries = archive.entries().findAll { it.name == providerDescriptor }.toList()
      if (providerEntries.size() != 1) {
        throw new RuntimeException(
            "Expected exactly one relocated SLF4J provider descriptor at ${providerDescriptor}, " +
                "found ${providerEntries.size()}")
      }
      def providerNames = archive.getInputStream(providerEntries[0]).withCloseable { input ->
        input.getText('UTF-8').readLines()
            .collect { it.trim() }
            .findAll { !it.isEmpty() && !it.startsWith('#') }
      }
      def expectedProvider = ['com.linkedin.openhouse.logging.SystemLoggerServiceProvider']
      if (providerNames != expectedProvider) {
        throw new RuntimeException(
            "Unexpected relocated SLF4J providers: ${providerNames}; expected ${expectedProvider}")
      }

      def canonicalLoggingPrefixes = [
          'org/slf4j/',
          'org/apache/log4j/',
          'org/apache/commons/logging/',
          'org/apache/logging/log4j/'
      ]
      def canonicalLoggingDottedPrefixes = [
          'org.slf4j.',
          'org.apache.log4j.',
          'org.apache.commons.logging.',
          'org.apache.logging.log4j.'
      ]
      def classesWithCanonicalLoggingReferences = archive.entries().findAll { entry ->
        if (entry.directory || !entry.name.endsWith('.class')) {
          return false
        }
        classUtf8Constants(archive, entry).any { constant ->
          canonicalLoggingPrefixes.any { prefix ->
            constant.startsWith(prefix) || constant.contains("L${prefix}")
          } || canonicalLoggingDottedPrefixes.any { constant.startsWith(it) }
        }
      }.collect { it.name }.sort()
      if (!classesWithCanonicalLoggingReferences.isEmpty()) {
        throw new RuntimeException(
            "Canonical logging references leaked into vendored bytecode:\n" +
                classesWithCanonicalLoggingReferences.take(50).join('\n'))
      }

      def forbiddenJdkRewrites = [
          'com/linkedin/openhouse/relocated/com/sun/security/',
          'com/linkedin/openhouse/relocated/com.sun.security.',
          'com/linkedin/openhouse/relocated/org/ietf/'
      ]
      def classesWithRewrittenJdkReferences = archive.entries().findAll { entry ->
        if (entry.directory || !entry.name.endsWith('.class')) {
          return false
        }
        def bytecode = archive.getInputStream(entry).withCloseable { input ->
          new String(input.readAllBytes(), java.nio.charset.StandardCharsets.ISO_8859_1)
        }
        forbiddenJdkRewrites.any(bytecode::contains)
      }.collect { it.name }.sort()
      if (!classesWithRewrittenJdkReferences.isEmpty()) {
        throw new RuntimeException(
            "JDK class references were incorrectly relocated:\n" +
                classesWithRewrittenJdkReferences.take(50).join('\n'))
      }
    } finally {
      archive.close()
    }
  }
}

tasks.check.dependsOn tasks.verifyShadingPolicy

gradle.projectsEvaluated {
  tasks.check.dependsOn rootProject.tasks.named('verifyLegacyRuntimeClassInventories')
}
