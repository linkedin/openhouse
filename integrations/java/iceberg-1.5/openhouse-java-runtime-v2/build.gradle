  implementation project(':integrations:java:iceberg-1.5:openhouse-java-iceberg-1.5-runtime')
  implementation project(':client:secureclient')
  implementation("com.linkedin.iceberg:iceberg-nessie:" + rootProject.ext.iceberg_1_5_version)
  implementation("com.linkedin.iceberg:iceberg-parquet:" + rootProject.ext.iceberg_1_5_version)
  implementation("org.slf4j:slf4j-api:${slf4jVersion}")
